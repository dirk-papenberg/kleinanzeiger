services:
  kleinanzeigen-agent:
    build:
      context: .
      cache_from:
        - type=local,src=/opt/buildkit-cache/kleinanzeigen-agent
      cache_to:
        - type=local,dest=/opt/buildkit-cache/kleinanzeigen-agent,mode=max
    container_name: kleinanzeigen-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      UV_NO_CACHE: "1"
    shm_size: '256m'
    security_opt:
      - seccomp:unconfined
    volumes:
      # per-user kleinanzeigen config dirs (config.yaml + ads/)
      - /docker-volumes/kleinanzeiger/kleinanzeigen-config:/docker-volumes/kleinanzeiger/kleinanzeigen-config
