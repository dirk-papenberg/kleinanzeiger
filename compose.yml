services:
  kleinanzeigen-agent:
    build:
      context: .
      cache_from:
        - kleinanzeigen-agent:latest
    container_name: kleinanzeigen-agent
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # persistent work/queue dirs and config survive container restarts
      - /opt/kleinanzeigen-agent/data:/data
