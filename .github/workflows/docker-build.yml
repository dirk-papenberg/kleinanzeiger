name: Build and Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.3.0

      - name: Build image (PR validation only)
        if: github.event_name == 'pull_request'
        run: docker compose build

      - name: Write .env file
        if: github.event_name != 'pull_request'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          KLEINANZEIGEN_USERNAME: ${{ secrets.KLEINANZEIGEN_USERNAME }}
          KLEINANZEIGEN_PASSWORD: ${{ secrets.KLEINANZEIGEN_PASSWORD }}
          ALLOWED_USERS: ${{ secrets.ALLOWED_USERS }}
        run: |
          {
            echo "TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}"
            echo "AWS_BEARER_TOKEN_BEDROCK=${AWS_BEARER_TOKEN_BEDROCK}"
            echo "KLEINANZEIGEN_USERNAME=${KLEINANZEIGEN_USERNAME}"
            echo "KLEINANZEIGEN_PASSWORD=${KLEINANZEIGEN_PASSWORD}"
            echo "ALLOWED_USERS=${ALLOWED_USERS}"
            echo "KLEINANZEIGEN_BOT_CMD=/usr/local/bin/kleinanzeigen"
            echo "KLEINANZEIGEN_BASE_DIR=/docker-volumes/kleinanzeiger/kleinanzeigen-config"
          } > .env

      - name: Remove existing container
        if: github.event_name != 'pull_request'
        run: docker rm -f kleinanzeigen-agent || true

      - name: Build and deploy
        if: github.event_name != 'pull_request'
        env:
          COMPOSE_BAKE: "true"
        run: docker compose up --build -d --force-recreate --remove-orphans
